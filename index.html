<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>קרין רבנה — ניהול פרויקטים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&display=swap');

  :root {
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E2DDD7;
    --border2: #CCC8C2;
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9992;
    --accent: #2D6A4F;
    --accent-light: #E8F4EE;
    --urgent: #C0392B;
    --urgent-light: #FDECEA;
    --high: #D35400;
    --high-light: #FEF0E7;
    --normal: #2D6A4F;
    --normal-light: #E8F4EE;
    --low: #7F8C8D;
    --low-light: #F2F3F3;
    --radius: 10px;
    --radius-sm: 6px;

    --s-send:    #E8F0FE; --s-send-b:    #3B5BDB; --s-send-t:    #2C44A8;
    --s-wait:    #FFF3CD; --s-wait-b:    #D4820A; --s-wait-t:    #9E6008;
    --s-edit:    #E1F5EE; --s-edit-b:    #2D6A4F; --s-edit-t:    #1A4A35;
    --s-deliver: #FCE8FF; --s-deliver-b: #9B27AF; --s-deliver-t: #6A1B75;
    --s-notes:   #FFF0E6; --s-notes-b:   #D35400; --s-notes-t:   #8F3900;
    --s-billing: #FEF3E2; --s-billing-b: #B7791F; --s-billing-t: #7B5013;
    --s-done:    #F0F0F0; --s-done-b:    #6B6560; --s-done-t:    #3A3835;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

  .shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px; background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 28px 0 20px;
    flex-shrink: 0; position: fixed; top: 0; right: 0; bottom: 0;
  }

  .logo { padding: 0 24px 28px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .logo-name { font-size: 15px; font-weight: 600; }
  .logo-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 24px;
    cursor: pointer; color: var(--text2); font-size: 14px;
    border-right: 3px solid transparent; transition: all 0.15s; user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { border-right-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .main { margin-right: 220px; flex: 1; padding: 32px 36px; max-width: 900px; }

  .page { display: none; }
  .page.active { display: block; }

  .page-header { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-start; }
  .page-title { font-size: 22px; font-weight: 600; }
  .page-date { font-size: 13px; color: var(--text3); margin-top: 3px; }

  .metric-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 28px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .metric-val { font-size: 32px; font-weight: 600; }
  .metric-val.red { color: var(--urgent); }
  .metric-val.green { color: var(--accent); }
  .metric-label { font-size: 12px; color: var(--text3); margin-top: 4px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; margin-bottom: 18px; }
  .card-title { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }

  .task-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .task-row:last-child { border-bottom: none; }
  .priority-strip { width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0; }
  .ps-urgent { background: var(--urgent); }
  .ps-high { background: var(--high); }
  .ps-normal { background: var(--normal); }
  .ps-low { background: var(--low); }

  .task-check {
    width: 20px; height: 20px; border: 1.5px solid var(--border2); border-radius: 5px;
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 12px; transition: all 0.15s;
  }
  .task-check:hover { border-color: var(--accent); }
  .task-check.done { background: var(--accent); border-color: var(--accent); color: #fff; }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; }
  .task-text.done { text-decoration: line-through; color: var(--text3); }
  .task-meta { font-size: 12px; color: var(--text3); margin-top: 2px; display: flex; gap: 8px; align-items: center; }

  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .b-urgent { background: var(--urgent-light); color: var(--urgent); }
  .b-high { background: var(--high-light); color: var(--high); }
  .b-normal { background: var(--normal-light); color: var(--normal); }
  .b-low { background: var(--low-light); color: var(--low); }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .add-btn {
    width: 100%; padding: 9px; border: 1.5px dashed var(--border2); border-radius: var(--radius-sm);
    background: transparent; color: var(--text3); font-size: 13px; cursor: pointer;
    margin-top: 10px; font-family: 'Heebo', sans-serif; transition: all 0.15s;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .form-row input, .form-row select {
    padding: 8px 12px; font-size: 13px; border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); font-family: 'Heebo', sans-serif; outline: none;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
  .btn-save {
    padding: 8px 18px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
    font-family: 'Heebo', sans-serif; font-weight: 500;
  }
  .btn-save:hover { background: #245C43; }
  .hidden { display: none !important; }

  .prog-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .prog-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.3s; }
  .prog-fill.amber { background: var(--high); }
  .prog-fill.red { background: var(--urgent); }

  .proj-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 14px; border-top: 4px solid var(--border); }
  .proj-card.s-send    { border-top-color: var(--s-send-b); background: linear-gradient(to bottom, var(--s-send) 0%, var(--surface) 60px); }
  .proj-card.s-wait    { border-top-color: var(--s-wait-b); background: linear-gradient(to bottom, var(--s-wait) 0%, var(--surface) 60px); }
  .proj-card.s-edit    { border-top-color: var(--s-edit-b); background: linear-gradient(to bottom, var(--s-edit) 0%, var(--surface) 60px); }
  .proj-card.s-deliver { border-top-color: var(--s-deliver-b); background: linear-gradient(to bottom, var(--s-deliver) 0%, var(--surface) 60px); }
  .proj-card.s-notes   { border-top-color: var(--s-notes-b); background: linear-gradient(to bottom, var(--s-notes) 0%, var(--surface) 60px); }
  .proj-card.s-billing { border-top-color: var(--s-billing-b); background: linear-gradient(to bottom, var(--s-billing) 0%, var(--surface) 60px); }
  .proj-card.s-done    { border-top-color: var(--s-done-b); background: linear-gradient(to bottom, var(--s-done) 0%, var(--surface) 60px); opacity: 0.75; }

  .modal-bg {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35);
    z-index:100; align-items:center; justify-content:center;
  }
  .modal-bg.open { display:flex; }
  .modal {
    background:var(--surface); border-radius:var(--radius); padding:28px 28px 22px;
    width:min(480px,90vw); box-shadow:0 8px 32px rgba(0,0,0,0.12);
  }
  .modal-title { font-size:17px; font-weight:600; margin-bottom:20px; }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block; font-size:12px; color:var(--text3); margin-bottom:5px; font-weight:500; }
  .modal-field input, .modal-field select {
    width:100%; padding:9px 12px; font-size:14px;
    border:1px solid var(--border2); border-radius:var(--radius-sm);
    background:var(--surface); color:var(--text); font-family:'Heebo',sans-serif; outline:none;
  }
  .modal-field input:focus, .modal-field select:focus { border-color:var(--accent); }
  .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
  .modal-actions button { padding:8px 20px; font-size:13px; font-family:'Heebo',sans-serif; border-radius:var(--radius-sm); cursor:pointer; font-weight:500; }
  .btn-cancel { background:transparent; border:1px solid var(--border2); color:var(--text2); }
  .btn-delete { background:transparent; border:1px solid var(--urgent); color:var(--urgent); margin-left:auto; }
  .btn-confirm { background:var(--accent); border:none; color:#fff; }
  .proj-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .proj-name { font-size: 15px; font-weight: 600; }
  .proj-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .proj-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .stage-row { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .stage-btn {
    font-size: 11px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px;
    background: var(--surface2); cursor: pointer; color: var(--text2);
    font-family: 'Heebo', sans-serif; transition: all 0.15s;
  }
  .stage-btn:hover { border-color: var(--accent); color: var(--accent); }
  .stage-btn.active        { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .stage-btn.active.s-send    { background: var(--s-send-b);    border-color: var(--s-send-b);    color:#fff; }
  .stage-btn.active.s-wait    { background: var(--s-wait-b);    border-color: var(--s-wait-b);    color:#fff; }
  .stage-btn.active.s-edit    { background: var(--s-edit-b);    border-color: var(--s-edit-b);    color:#fff; }
  .stage-btn.active.s-deliver { background: var(--s-deliver-b); border-color: var(--s-deliver-b); color:#fff; }
  .stage-btn.active.s-notes   { background: var(--s-notes-b);   border-color: var(--s-notes-b);   color:#fff; }
  .stage-btn.active.s-billing { background: var(--s-billing-b); border-color: var(--s-billing-b); color:#fff; }
  .stage-btn.active.s-done    { background: var(--s-done-b);    border-color: var(--s-done-b);    color:#fff; }

  .proj-bottom {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
  }
  .proj-section-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

  .num-row { display: flex; align-items: center; gap: 8px; }
  .num-row input {
    width: 65px; padding: 6px 10px; font-size: 14px; font-weight: 500;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); font-family: 'Heebo', sans-serif; outline: none; text-align: center;
  }
  .num-row input:focus { border-color: var(--accent); }
  .num-row span { font-size: 13px; color: var(--text2); }
  .goal-pct { font-size: 12px; font-weight: 600; color: var(--accent); margin-right: 4px; }

  .new-day-btn {
    padding: 9px 20px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
    font-family: 'Heebo', sans-serif; cursor: pointer; white-space: nowrap;
  }
  .new-day-btn:hover { background: #245C43; }

  .quick-btns { display: flex; gap: 5px; margin-top: 8px; }
  .qbtn {
    padding: 5px 10px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface2); cursor: pointer; color: var(--text2);
    font-family: 'Heebo', sans-serif; transition: all 0.15s;
  }
  .qbtn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .qbtn.minus:hover { background: var(--urgent-light); border-color: var(--urgent); color: var(--urgent); }

  .notes-area {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
  }
  .notes-area textarea {
    width: 100%; padding: 8px 12px; font-size: 13px; line-height: 1.5;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text); font-family: 'Heebo', sans-serif;
    resize: none; outline: none; min-height: 60px;
  }
  .notes-area textarea:focus { border-color: var(--accent); background: var(--surface); }

  .mini-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 12px; }
  .mini-stat {
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 8px 10px; text-align: center;
  }
  .mini-stat-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .mini-stat-val { font-size: 17px; font-weight: 600; color: var(--text); }

  @media (max-width: 680px) {
    .sidebar { width: 60px; }
    .logo, .nav-item span, #sync-status, #reset-btn { display: none; }
    .nav-icon { width: 100%; text-align: center; font-size: 18px; }
    .main { margin-right: 60px; padding: 20px 16px; }
    .proj-bottom { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="shell">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-name">קרין רבנה</div>
      <div class="logo-sub">צלמת אדריכלות ועיצוב פנים</div>
    </div>
    <div class="nav-item active" onclick="showPage('morning',this)">
      <span class="nav-icon">☀</span><span>בוקר טוב</span>
    </div>
    <div class="nav-item" onclick="showPage('projects',this)">
      <span class="nav-icon">📁</span><span>פרויקטים</span>
    </div>
    <div style="margin-top:auto;padding:16px 24px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">סנכרון ענן</div>
      <div id="sync-status" style="font-size:12px;color:var(--text3)">מתחבר...</div>
      <button id="reset-btn" onclick="resetAll()" style="margin-top:12px;width:100%;padding:7px;font-size:12px;font-family:'Heebo',sans-serif;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text3);cursor:pointer;">🗑 מחק הכל</button>
    </div>
  </aside>

  <main class="main">

    <!-- MORNING -->
    <div id="page-morning" class="page active">
      <div class="page-header">
        <div>
          <div class="page-title" id="morning-greeting">בוקר טוב, קרין</div>
          <div class="page-date" id="today-date"></div>
        </div>
        <button class="new-day-btn" onclick="newDay()">☀ יום חדש</button>
      </div>
      <div class="metric-row">
        <div class="metric-card"><div class="metric-val red" id="m-urgent">0</div><div class="metric-label">משימות דחופות</div></div>
        <div class="metric-card"><div class="metric-val" id="m-todo">0</div><div class="metric-label">נשארו להיום</div></div>
        <div class="metric-card"><div class="metric-val green" id="m-done">0</div><div class="metric-label">הושלמו</div></div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--urgent)"></div>דחוף</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--high)"></div>גבוה</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--normal)"></div>רגיל</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--low)"></div>נמוך</div>
      </div>
      <div class="card">
        <div class="card-title">משימות — ממוינות לפי עדיפות</div>
        <div id="tasks-list"></div>
        <button class="add-btn" onclick="toggleEl('add-task-form')">+ הוסף משימה</button>
        <div id="add-task-form" class="hidden">
          <div class="form-row">
            <input type="text" id="nt-text" placeholder="תיאור המשימה" style="flex:2;min-width:160px" />
            <select id="nt-client"><option value="">לקוח</option></select>
            <select id="nt-stage">
              <option value="send">לשלוח לסינון</option>
              <option value="wait">מחכה לסינון לקוח</option>
              <option value="edit">עריכה</option>
              <option value="deliver">שליחה ללקוח</option>
              <option value="notes">הערות</option>
              <option value="billing">גביה</option>
              <option value="done">הסתיים</option>
            </select>
            <select id="nt-priority">
              <option value="urgent">דחוף</option>
              <option value="high">גבוה</option>
              <option value="normal" selected>רגיל</option>
              <option value="low">נמוך</option>
            </select>
            <button class="btn-save" onclick="addTask()">שמור</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PROJECTS -->
    <div id="page-projects" class="page">
      <div class="page-header">
        <div class="page-title">פרויקטים</div>
      </div>
      <div id="projects-list"></div>
      <button class="add-btn" onclick="toggleEl('add-proj-form')">+ פרויקט חדש</button>
      <div id="add-proj-form" class="hidden" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-top:10px">
        <div class="form-row" style="border:none;padding:0;margin:0">
          <input type="text" id="np-client" placeholder="שם לקוח" />
          <input type="text" id="np-title" placeholder="שם פרויקט" style="flex:2;min-width:140px" />
          <input type="date" id="np-date" />
          <input type="number" id="np-total" placeholder="סה״כ תמונות" min="0" style="width:120px" />
          <input type="number" id="np-goal" placeholder="יעד יומי" min="0" style="width:100px" />
          <button class="btn-save" onclick="addProject()">הוסף</button>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <div class="modal-title">עריכת פרויקט</div>
    <div class="modal-row">
      <div class="modal-field"><label>שם לקוח</label><input id="e-client" type="text" /></div>
      <div class="modal-field"><label>שם פרויקט</label><input id="e-title" type="text" /></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>תאריך צילום</label><input id="e-date" type="date" /></div>
      <div class="modal-field"><label>סה"כ תמונות</label><input id="e-total" type="number" min="0" /></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>יעד יומי</label><input id="e-goal" type="number" min="0" /></div>
      <div class="modal-field"><label>שלב</label>
        <select id="e-stage"></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" onclick="deleteProject()">🗑 מחק פרויקט</button>
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-confirm" onclick="saveEdit()">שמור</button>
    </div>
  </div>
</div>

<script>
const STAGES={
  send:    'לשלוח לסינון',
  wait:    'מחכה לסינון לקוח',
  edit:    'עריכה',
  deliver: 'שליחה ללקוח',
  notes:   'הערות',
  billing: 'גביה',
  done:    'הסתיים',
};
const PORDER={urgent:0,high:1,normal:2,low:3};
const PLABEL={urgent:'דחוף',high:'גבוה',normal:'רגיל',low:'נמוך'};
const PBADGE={urgent:'b-urgent',high:'b-high',normal:'b-normal',low:'b-low'};
const PSTRIP={urgent:'ps-urgent',high:'ps-high',normal:'ps-normal',low:'ps-low'};

let state={projects:[],tasks:[]};

const API='https://script.google.com/macros/s/AKfycbxl8pTdSf27y5gPzMEfHJ_QlhK4ePP6ZU_6ZhfzeQqaP4fWkDUbc4kfmYsJBLJVcLBtHw/exec';
let saveTimer=null;

function setSyncStatus(msg,color){
  const el=document.getElementById('sync-status');
  if(el){el.textContent=msg;el.style.color=color||'var(--text3)';}
}

function save(){
  try{localStorage.setItem('karin_pm',JSON.stringify(state));}catch(e){}
  clearTimeout(saveTimer);
  setSyncStatus('שומר...','var(--text3)');
  saveTimer=setTimeout(()=>{
    fetch(API,{method:'POST',body:JSON.stringify({action:'save',state})})
    .then(r=>r.json())
    .then(d=>setSyncStatus(d.ok?'✓ נשמר ב-Google Sheets':'שגיאה בשמירה', d.ok?'var(--accent)':'var(--urgent)'))
    .catch(()=>setSyncStatus('נשמר מקומית בלבד','var(--high)'));
  },1500);
}

async function load(){
  const stageMap={culling:'send',retouch:'edit',approval:'wait',delivery:'deliver'};
  try{
    const s=localStorage.getItem('karin_pm');
    if(s){
      const parsed=JSON.parse(s);
      if(parsed.projects) parsed.projects=parsed.projects.map(p=>({...p,stage:stageMap[p.stage]||p.stage||'send'}));
      state=parsed;
    }
  }catch(e){}
  setSyncStatus('טוען...','var(--text3)');
  try{
    const r=await fetch(API+'?t='+Date.now());
    const d=await r.json();
    if(d.ok&&d.state&&d.state.projects&&d.state.projects.length>0){
      state=d.state;
      const stageMap={culling:'send',retouch:'edit',approval:'wait',delivery:'deliver'};
      state.projects=state.projects.map(p=>({
        ...p,
        id:Number(p.id)||p.id,
        total:Number(p.total)||0,
        edited:Number(p.edited)||0,
        goalDaily:Number(p.goalDaily)||0,
        goalDone:Number(p.goalDone)||0,
        stage: stageMap[p.stage] || p.stage || 'send',
      }));
      state.tasks=(state.tasks||[]).map(t=>({...t,id:Number(t.id)||t.id,done:Number(t.done)||0}));
      try{localStorage.setItem('karin_pm',JSON.stringify(state));}catch(e){}
      setSyncStatus('✓ סונכרן','var(--accent)');
    } else {
      setSyncStatus('עובד מקומית','var(--text3)');
    }
  }catch(e){
    setSyncStatus('עובד מקומית','var(--high)');
  }
}

function showPage(p,el){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  el.classList.add('active');
}

function toggleEl(id){document.getElementById(id).classList.toggle('hidden');}

function setGreeting(){
  const h=new Date().getHours();
  let g=h<12?'בוקר טוב':h<17?'צהריים טובים':'ערב טוב';
  document.getElementById('morning-greeting').textContent=g+', קרין';
  const d=new Date();
  const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  document.getElementById('today-date').textContent='יום '+days[d.getDay()]+', '+d.toLocaleDateString('he-IL');
}

function render(){
  setGreeting();
  renderTasks();
  renderProjects();
  refreshSelects();
}

function renderTasks(){
  const sorted=[...state.tasks].sort((a,b)=>PORDER[a.priority]-PORDER[b.priority]);
  document.getElementById('m-urgent').textContent=sorted.filter(t=>t.priority==='urgent'&&!t.done).length;
  document.getElementById('m-todo').textContent=sorted.filter(t=>!t.done).length;
  document.getElementById('m-done').textContent=sorted.filter(t=>t.done).length;
  document.getElementById('tasks-list').innerHTML=sorted.map(t=>`
    <div class="task-row">
      <div class="priority-strip ${PSTRIP[t.priority]}"></div>
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
      <div class="task-body">
        <div class="task-text ${t.done?'done':''}">${t.text}</div>
        <div class="task-meta">${t.client?t.client+' · ':''} ${STAGES[t.stage]||t.stage}
          <span class="badge ${PBADGE[t.priority]}">${PLABEL[t.priority]}</span>
        </div>
      </div>
    </div>`).join('');
}

function toggleTask(id){
  const t=state.tasks.find(t=>t.id===id);
  if(t){t.done=t.done?0:1;save();renderTasks();}
}

function addTask(){
  const text=document.getElementById('nt-text').value.trim();
  if(!text) return;
  state.tasks.push({id:Date.now(),text,
    client:document.getElementById('nt-client').value,
    stage:document.getElementById('nt-stage').value,
    priority:document.getElementById('nt-priority').value,
    done:0});
  document.getElementById('nt-text').value='';
  document.getElementById('add-task-form').classList.add('hidden');
  save(); renderTasks(); refreshSelects();
}

function renderProjects(){
  const el=document.getElementById('projects-list');
  if(!el) return;
  if(!state.projects.length){
    el.innerHTML='<p style="font-size:13px;color:var(--text3);padding:16px 0">עוד אין פרויקטים — הוסיפי את הראשון למטה</p>';
    return;
  }
  el.innerHTML=state.projects.map(p=>{
    const pct=p.total?Math.min(100,Math.round(p.edited/p.total*100)):0;
    const fillCls=pct>=80?'red':pct>=50?'amber':'';
    const stages=Object.keys(STAGES).map(s=>`
      <button class="stage-btn ${p.stage===s?'active s-'+s:''}" onclick="setStage(${p.id},'${s}')">${STAGES[s]}</button>`).join('');
    const urgCnt=state.tasks.filter(t=>t.client===p.client&&t.priority==='urgent'&&!t.done).length;
    const goalDone=p.goalDone||0;
    const goalTarget=p.goalDaily||0;
    const goalPct=goalTarget?Math.min(100,Math.round(goalDone/goalTarget*100)):0;
    return `<div class="proj-card s-${p.stage||'send'}">
      <div class="proj-header">
        <div>
          <div class="proj-name">${p.client} — ${p.title}</div>
          <div class="proj-sub">מועד: ${p.date||'—'} · ${p.edited}/${p.total} תמונות · ${pct}%</div>
        </div>
        <div class="proj-badges">
          ${urgCnt?`<span class="badge b-urgent">${urgCnt} דחוף</span>`:''}
          <span class="badge b-normal">${pct}%</span>
          <button onclick="openEdit(${p.id})" style="padding:4px 10px;font-size:12px;font-family:'Heebo',sans-serif;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);cursor:pointer;color:var(--text2);">✏ עריכה</button>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill ${fillCls}" style="width:${pct}%"></div></div>
      <div class="mini-stats">
        <div class="mini-stat"><div class="mini-stat-label">סה"כ</div><div class="mini-stat-val">${p.total}</div></div>
        <div class="mini-stat"><div class="mini-stat-label">נערכו</div><div class="mini-stat-val">${p.edited}</div></div>
        <div class="mini-stat"><div class="mini-stat-label">נשאר</div><div class="mini-stat-val">${Math.max(0,(p.total||0)-(p.edited||0))}</div></div>
        <div class="mini-stat"><div class="mini-stat-label">היום</div><div class="mini-stat-val" style="${goalTarget&&goalDone>=goalTarget?'color:var(--accent)':''}">${goalDone}/${goalTarget||0}</div></div>
      </div>
      <div class="stage-row">${stages}</div>
      <div class="proj-bottom">
        <div>
          <div class="proj-section-label">תמונות שנערכו</div>
          <div class="num-row">
            <input type="number" value="${p.edited}" min="0" max="${p.total}" onchange="updateEdited(${p.id},this.value)" id="edited-${p.id}" />
            <span>מתוך ${p.total}</span>
          </div>
          <div class="quick-btns">
            <button class="qbtn minus" onclick="bumpEdited(${p.id},-1)">−1</button>
            <button class="qbtn minus" onclick="bumpEdited(${p.id},-5)">−5</button>
            <button class="qbtn" onclick="bumpEdited(${p.id},1)">+1</button>
            <button class="qbtn" onclick="bumpEdited(${p.id},5)">+5</button>
            <button class="qbtn" onclick="bumpEdited(${p.id},10)">+10</button>
          </div>
        </div>
        <div>
          <div class="proj-section-label">יעד יומי ${goalTarget?`<span class="goal-pct">· ${goalPct}%</span>`:''}</div>
          <div class="num-row">
            <input type="number" value="${goalDone}" min="0" placeholder="בוצע" onchange="updateGoalDone(${p.id},this.value)" id="gdone-${p.id}" />
            <span>/</span>
            <input type="number" value="${goalTarget||''}" min="0" placeholder="יעד" style="width:55px" onchange="updateGoalTarget(${p.id},this.value)" />
            <span style="font-size:12px;color:var(--text3)">תמונות</span>
          </div>
          <div class="quick-btns">
            <button class="qbtn minus" onclick="bumpGoal(${p.id},-1)">−1</button>
            <button class="qbtn" onclick="bumpGoal(${p.id},1)">+1</button>
            <button class="qbtn" onclick="bumpGoal(${p.id},5)">+5</button>
            <button class="qbtn" onclick="bumpGoal(${p.id},10)">+10</button>
          </div>
          ${goalTarget?`<div class="prog-bar" style="margin-top:8px"><div class="prog-fill" style="width:${goalPct}%"></div></div>`:''}
        </div>
      </div>
      <div class="notes-area">
        <div class="proj-section-label">הערות</div>
        <textarea placeholder="מה עשיתי · מה נשאר · הערות ללקוח..." onchange="updateNotes(${p.id},this.value)">${p.notes||''}</textarea>
      </div>
    </div>`;
  }).join('');
}

function setStage(id,s){const p=state.projects.find(p=>p.id===id);if(p){p.stage=s;save();renderProjects();}}
function updateEdited(id,v){const p=state.projects.find(p=>p.id===id);if(p){p.edited=Math.max(0,parseInt(v)||0);save();renderProjects();}}
function updateGoalDone(id,v){const p=state.projects.find(p=>p.id===id);if(p){p.goalDone=Math.max(0,parseInt(v)||0);save();renderProjects();}}
function updateGoalTarget(id,v){const p=state.projects.find(p=>p.id===id);if(p){p.goalDaily=Math.max(0,parseInt(v)||0);save();renderProjects();}}
function updateNotes(id,v){const p=state.projects.find(p=>p.id===id);if(p){p.notes=v;save();}}

function bumpEdited(id,delta){
  const p=state.projects.find(p=>p.id===id);
  if(!p) return;
  p.edited=Math.max(0,Math.min(p.total||9999,(p.edited||0)+delta));
  save();
  const inp=document.getElementById('edited-'+id);
  if(inp) inp.value=p.edited;
  renderProjects();
}

function bumpGoal(id,delta){
  const p=state.projects.find(p=>p.id===id);
  if(!p) return;
  p.goalDone=Math.max(0,(p.goalDone||0)+delta);
  save();
  const inp=document.getElementById('gdone-'+id);
  if(inp) inp.value=p.goalDone;
  renderProjects();
}

function addProject(){
  const client=document.getElementById('np-client').value.trim();
  const title=document.getElementById('np-title').value.trim();
  if(!client||!title) return;
  state.projects.push({
    id:Date.now(),client,title,
    date:document.getElementById('np-date').value,
    stage:'send',
    total:parseInt(document.getElementById('np-total').value)||0,
    edited:0,
    goalDaily:parseInt(document.getElementById('np-goal').value)||0,
    goalDone:0,
  });
  ['np-client','np-title','np-date','np-total','np-goal'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('add-proj-form').classList.add('hidden');
  save(); renderProjects(); refreshSelects();
}

let editingId=null;

function openEdit(id){
  const p=state.projects.find(p=>p.id===id);
  if(!p) return;
  editingId=id;
  document.getElementById('e-client').value=p.client||'';
  document.getElementById('e-title').value=p.title||'';
  document.getElementById('e-date').value=p.date||'';
  document.getElementById('e-total').value=p.total||'';
  document.getElementById('e-goal').value=p.goalDaily||'';
  const sel=document.getElementById('e-stage');
  sel.innerHTML=Object.keys(STAGES).map(s=>`<option value="${s}" ${p.stage===s?'selected':''}>${STAGES[s]}</option>`).join('');
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal(){
  document.getElementById('edit-modal').classList.remove('open');
  editingId=null;
}

function saveEdit(){
  const p=state.projects.find(p=>p.id===editingId);
  if(!p){closeModal();return;}
  p.client=document.getElementById('e-client').value.trim()||p.client;
  p.title=document.getElementById('e-title').value.trim()||p.title;
  p.date=document.getElementById('e-date').value;
  p.total=parseInt(document.getElementById('e-total').value)||p.total;
  p.goalDaily=parseInt(document.getElementById('e-goal').value)||0;
  p.stage=document.getElementById('e-stage').value;
  closeModal();
  save(); render();
}

function deleteProject(){
  if(!confirm('למחוק את הפרויקט לצמיתות?')) return;
  state.projects=state.projects.filter(p=>p.id!==editingId);
  closeModal();
  save(); render();
}

document.getElementById('edit-modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});
  const cl=document.getElementById('nt-client');
  if(cl) cl.innerHTML='<option value="">לקוח</option>'+[...new Set(state.projects.map(p=>p.client))].map(c=>`<option>${c}</option>`).join('');
}

function newDay(){
  if(!confirm('לאפס את היעדים היומיים של כל הפרויקטים?\nשאר המידע נשמר.')) return;
  state.projects.forEach(p=>{p.goalDone=0;});
  save(); renderProjects();
}

function resetAll(){
  if(!confirm('למחוק את כל הנתונים? פעולה זו אינה הפיכה.')) return;
  state={projects:[],tasks:[]};
  try{localStorage.removeItem('karin_pm');}catch(e){}
  save(); render();
}

load().then(()=>render());
</script>
</body>
</html>
